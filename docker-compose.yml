services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nest-prisma-app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:M%40109G6Gustav@host.docker.internal:3306/nest_prismadb
